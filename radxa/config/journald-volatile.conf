[Journal]
# Volatile = RAM only. No writes to disk. Lost on power cut (fine for car device).
Storage=volatile

# Cap RAM usage — 16MB total, 4MB per file
RuntimeMaxUse=16M
RuntimeMaxFileSize=4M

# Only store warnings and above (reduce noise, save RAM)
MaxLevelStore=warning

# Console gets errors only
MaxLevelConsole=err

# No rate limiting for compositor/aa-proxy debug sessions
RateLimitIntervalSec=0
