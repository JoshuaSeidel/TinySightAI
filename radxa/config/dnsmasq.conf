# DHCP server for the AADongle WiFi network
# Assigns IPs to T-Dongle, phone, and any other connected devices

interface=ap0
bind-interfaces

# DHCP range: .2 through .20 (we only need 2-3 clients)
dhcp-range=192.168.4.2,192.168.4.20,255.255.255.0,24h

# Radxa is the gateway and DNS server
dhcp-option=3,192.168.4.1
dhcp-option=6,192.168.4.1

# Static lease for T-Dongle (optional, makes debugging easier)
# dhcp-host=AA:BB:CC:DD:EE:FF,192.168.4.2,t-dongle

# Don't forward DNS queries — we're an isolated network
no-resolv
address=/#/192.168.4.1
