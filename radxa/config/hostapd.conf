# Radxa Zero 3W — Hidden 5GHz WiFi AP for AA/CarPlay
# All devices connect here: T-Dongle, Android phone, iPhone

interface=wlan0
driver=nl80211

# Hidden SSID — random phones won't see it
ssid=AADongle
ignore_broadcast_ssid=1

# 5 GHz band (required for CarPlay, better for AA)
hw_mode=a
channel=36

# 802.11ac/n for maximum throughput
ieee80211n=1
ieee80211ac=1

# HT capabilities for 5 GHz
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40][DSSS_CCK-40]

# VHT capabilities
vht_oper_chwidth=0
vht_oper_centr_freq_seg0_idx=0

# WPA2 security
wpa=2
wpa_passphrase=AADongle5GHz!
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Max 3 clients: T-Dongle + phone + spare
max_num_sta=3

# Country code (adjust for your region)
country_code=US
ieee80211d=1

# Logging
logger_syslog=-1
logger_syslog_level=2
